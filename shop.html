<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Browse menu and order via WhatsApp — FoodKnock Quick Order" />
  <meta name="theme-color" content="#ff7a00" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <title>Shop Menu — FoodKnock</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Bootstrap 5 CSS -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    crossorigin="anonymous" />

  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    crossorigin="anonymous" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet" />

  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ╔══════════════════════════════╗ -->
  <!-- ║         NAVBAR               ║ -->
  <!-- ╚══════════════════════════════╝ -->
  <nav class="fk-navbar" role="navigation" aria-label="Shop page navigation">
    <div class="fk-navbar-inner">
      <a href="index.html" class="fk-back-btn" aria-label="Go back to all shops">
        <i class="bi bi-arrow-left"></i>
        <span class="d-none d-sm-inline">All Shops</span>
        <span class="d-sm-none">Back</span>
      </a>
      <div class="fk-brand" style="text-align:right">
        <div class="fk-brand-name"><span class="orange">Food</span>Knock</div>
      </div>
    </div>
  </nav>

  <!-- ╔══════════════════════════════╗ -->
  <!-- ║       SHOP HEADER STRIP      ║ -->
  <!-- ╚══════════════════════════════╝ -->
  <div class="fk-shop-header" id="fk-shop-header-strip" role="banner">
    <div class="fk-shop-header-inner">
      <div class="fk-shop-header-emoji" id="fk-shop-emoji" aria-hidden="true">🍽️</div>
      <div>
        <div class="fk-shop-header-name" id="fk-shop-name">Loading…</div>
        <div class="fk-shop-header-meta">
          <span id="fk-shop-cat">—</span>
          <span style="opacity:0.3">·</span>
          <span class="fk-shop-header-accent" id="fk-shop-tagline-h"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- ╔══════════════════════════════╗ -->
  <!-- ║       SEARCH + MENU          ║ -->
  <!-- ╚══════════════════════════════╝ -->
  <section class="py-4">
    <div class="container">

      <!-- Search -->
      <div class="fk-search-wrap mb-4">
        <i class="bi bi-search fk-search-icon" aria-hidden="true"></i>
        <input
          type="search"
          id="fk-search"
          class="fk-search-input"
          placeholder="Search menu items…"
          autocomplete="off"
          spellcheck="false"
          aria-label="Search menu items"
        />
      </div>

      <!-- Section label -->
      <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
          <div class="fk-section-eyebrow">Full Menu</div>
          <div class="fk-section-title" style="font-size:1.3rem">What's on the menu</div>
        </div>
        <span style="font-size:0.72rem;color:var(--text-muted);font-weight:600;background:#fff;border:1px solid var(--border-soft);padding:5px 12px;border-radius:999px">
          Prices in ₹
        </span>
      </div>

      <!-- Menu Items — filled by app.js renderMenu() -->
      <div class="fk-menu-list" id="fk-menu-list" role="list" aria-label="Menu items">
        <!-- Shimmer rendered by JS while loading -->
      </div>

    </div>
  </section>

  <!-- Spacer so FAB doesn't cover last item -->
  <div style="height: 110px" aria-hidden="true"></div>

  <!-- ╔══════════════════════════════╗ -->
  <!-- ║    FLOATING CART BUTTON      ║ -->
  <!-- ╚══════════════════════════════╝ -->
  <button
    id="fk-cart-fab"
    class="fk-cart-fab hidden"
    aria-label="Open cart"
    onclick="openCartPanel()">
    <i class="bi bi-cart3" style="font-size:1.1rem" aria-hidden="true"></i>
    <span class="fk-cart-fab-label">View Cart</span>
    <span class="fk-cart-fab-count" id="fk-cart-count" aria-live="polite">0</span>
  </button>

  <!-- ╔══════════════════════════════╗ -->
  <!-- ║     CART OFFCANVAS PANEL     ║ -->
  <!-- ╚══════════════════════════════╝ -->
  <div
    class="offcanvas offcanvas-end fk-cart-panel"
    tabindex="-1"
    id="fk-cart-offcanvas"
    aria-labelledby="fk-cart-label">

    <!-- Header -->
    <div class="offcanvas-header">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-cart3" style="color:var(--shop-accent, var(--brand-orange));font-size:1.2rem" aria-hidden="true"></i>
        <h5 class="offcanvas-title" id="fk-cart-label">Your Cart</h5>
      </div>
      <button
        type="button"
        class="btn-close"
        data-bs-dismiss="offcanvas"
        aria-label="Close cart">
      </button>
    </div>

    <!-- Body -->
    <div class="offcanvas-body d-flex flex-column">

      <!-- Cart items injected by JS -->
      <div id="fk-cart-body" style="flex:1">
        <div class="fk-cart-empty">
          <div class="fk-cart-empty-icon">🛒</div>
          <div class="fk-cart-empty-title">Your cart is empty</div>
          <div class="fk-cart-empty-text">Add items from the menu above.</div>
        </div>
      </div>

      <!-- Total + CTA (always visible at bottom) -->
      <div id="fk-cart-footer" style="margin-top:auto;padding-top:14px;border-top:1px solid var(--border-soft)">
        <!-- Total Bar -->
        <div class="fk-cart-total-bar">
          <span class="fk-cart-total-label">
            <i class="bi bi-receipt" aria-hidden="true"></i> Order Total
          </span>
          <span class="fk-cart-total-amount" id="fk-cart-total" aria-live="polite">₹0</span>
        </div>

        <!-- WhatsApp Order Button -->
        <button
          id="fk-place-order-btn"
          class="fk-btn-order"
          disabled
          onclick="placeOrder()">
          <i class="bi bi-whatsapp" style="font-size:1.1rem" aria-hidden="true"></i>
          Place Order via WhatsApp
        </button>

        <div style="text-align:center;font-size:0.7rem;color:var(--text-muted);margin-top:10px;font-weight:600">
          <i class="bi bi-shield-check" aria-hidden="true"></i> No data stored on servers
        </div>
      </div>

    </div>
  </div>

  <!-- ╔══════════════════════════════╗ -->
  <!-- ║         FOOTER               ║ -->
  <!-- ╚══════════════════════════════╝ -->
  <footer class="fk-footer" style="margin-top:20px">
    <div class="container">
      <strong>FoodKnock</strong> &nbsp;·&nbsp;
      <a href="index.html">← Back to all shops</a>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous">
  </script>

  <!-- App Data & Logic -->
  <script src="data.js"></script>
  <script src="app.js"></script>

</body>
</html>
